<!-- 
  CASHFLOW DASHBOARD - ALL-IN-ONE FOR GOOGLE APPS SCRIPT
  This file contains HTML, CSS, JS, and Embedded Bank Logos.
  Instructions: Copy this entire file into a new HTML file named 'Index' in Apps Script.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CashFlow Dashboard Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        /* CSS FROM style.css (Optimized) */
        :root {
            --bg-main: #0b1121; --bg-secondary: #0f172a; --surface: rgba(15, 23, 42, 0.7);
            --text-primary: #f8fafc; --text-muted: #94a3b8; --primary: #38bdf8;
            --income: #10b981; --income-bg: rgba(16, 185, 129, 0.15);
            --expense: #ef4444; --expense-bg: rgba(239, 68, 68, 0.15);
            --border-color: rgba(255, 255, 255, 0.06);
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-main); color: var(--text-primary); margin: 0; }
        .dashboard-container { max-width: 1500px; margin: 0 auto; padding: 20px; }
        .glass { background: var(--surface); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 16px; }
        
        /* Layout */
        .app-layout { display: flex; min-height: 100vh; }
        .sidebar-nav { width: 260px; background: #070b14; border-right: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; }
        .dashboard-body { flex: 1; padding: 20px; display: flex; gap: 20px; }
        .main-content { flex: 1; }
        .right-sidebar { width: 350px; }

        /* Cards */
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .card { padding: 20px; position: relative; }
        .card .amount { font-size: 28px; font-weight: 700; margin: 10px 0; }
        
        /* Bank Logos (Base64) */
        .bank-icon { width: 32px; height: 32px; border-radius: 8px; object-fit: cover; }
        
        /* Sidebar Styles */
        .nav-link { display: flex; align-items: center; gap: 10px; padding: 12px; color: var(--text-muted); text-decoration: none; border-radius: 10px; margin-bottom: 5px; }
        .nav-link.active { background: rgba(56, 189, 248, 0.1); color: var(--primary); }
        
        /* Global Loader */
        .global-loader { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(11, 17, 33, 0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s; }
        .global-loader.hidden { opacity: 0; pointer-events: none; }
        .loader-spinner { width: 50px; height: 50px; border: 4px solid rgba(56, 189, 248, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Feed */
        .transaction-card { background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .t-card-header { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; }
        .t-card-desc { font-size: 13px; font-weight: 500; margin-bottom: 10px; }
        .t-card-amount { font-size: 16px; font-weight: 700; text-align: right; }
        .income { color: var(--income); }
        .expense { color: var(--expense); }

        /* Headers & Filters */
        header h1 { font-size: 24px; margin: 0; }
        .header-filters { display: flex; flex-wrap: wrap; gap: 15px; margin: 20px 0; background: rgba(15, 23, 42, 0.3); padding: 15px; border-radius: 12px; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        select, input { background: #0d1625; border: 1px solid var(--border-color); color: white; padding: 8px; border-radius: 8px; }

        /* Detail Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: #0f172a; width: 90%; max-width: 800px; max-height: 80vh; border-radius: 20px; padding: 30px; overflow-y: auto; border: 1px solid var(--border-color); }
    </style>
</head>
<body>
    <div id="global-loader" class="global-loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <h2 style="margin-top: 15px;">กำลังเชื่อมต่อ Google Sheets...</h2>
        </div>
    </div>

    <div class="app-layout">
        <aside class="sidebar-nav">
            <div style="font-size: 20px; font-weight: 800; color: white; margin-bottom: 30px;">💰 CASHFLOW</div>
            <nav>
                <a href="#" class="nav-link active">🏠 Dashboard</a>
                <a href="#" class="nav-link">📊 Analytics</a>
                <a href="#" class="nav-link">🏦 Banks</a>
            </nav>
            <div style="margin-top: auto;">
                <button onclick="refreshData()" style="width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 10px; color: #000; font-weight: 700; cursor: pointer;">🔄 Refresh Data</button>
                <div id="last-sync-time" style="font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 10px;"></div>
            </div>
        </aside>

        <div class="dashboard-body">
            <main class="main-content">
                <header>
                    <h1>Dashboard Live</h1>
                    <div id="header-net-amount" style="font-size: 32px; font-weight: 800; margin-top: 10px;">0.00</div>
                </header>

                <div class="header-filters">
                    <div class="filter-group">
                        <label style="font-size: 11px; color: var(--text-muted);">BANK</label>
                        <select id="filter-bank" onchange="applyFilters()">
                            <option value="All">ทั้งหมด</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label style="font-size: 11px; color: var(--text-muted);">TYPE</label>
                        <select id="filter-type" onchange="applyFilters()">
                            <option value="All">ทั้งหมด</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                </div>

                <div class="summary-cards">
                    <div class="card glass">
                        <div style="color: var(--income);">Actual Income</div>
                        <div id="income-actual" class="amount">0.00</div>
                    </div>
                    <div class="card glass">
                        <div style="color: var(--text-muted);">Plan Income</div>
                        <div id="income-plan" class="amount">0.00</div>
                    </div>
                    <div class="card glass">
                        <div style="color: var(--expense);">Actual Expense</div>
                        <div id="expense-actual" class="amount">0.00</div>
                    </div>
                    <div class="card glass">
                        <div style="color: var(--text-muted);">Plan Expense</div>
                        <div id="expense-plan" class="amount">0.00</div>
                    </div>
                </div>

                <div id="comparison-chart" class="glass" style="height: 350px; padding: 20px;"></div>
            </main>

            <aside class="right-sidebar">
                <h3 style="margin-top: 0;">Recent Activity</h3>
                <div id="table-body">
                    <!-- Cards injected here -->
                </div>
            </aside>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detail-modal" class="modal-overlay" onclick="if(event.target==this) this.classList.remove('active')">
        <div class="modal-box">
            <h2 id="modal-title">Details</h2>
            <div id="modal-content"></div>
            <button onclick="document.getElementById('detail-modal').classList.remove('active')" style="margin-top: 20px; padding: 10px 20px; background: #334155; border: none; color: white; border-radius: 8px; cursor: pointer;">Close</button>
        </div>
    </div>

    <script>
        // CLIENT-SIDE LOGIC
        let allTransactions = [];
        let allPlans = [];

        function showLoader() { document.getElementById('global-loader').classList.remove('hidden'); }
        function hideLoader() { document.getElementById('global-loader').classList.add('hidden'); }

        async function initDashboard() {
            showLoader();
            try {
                // เรียกฟังก์ชันใน Apps Script ฝั่ง Server
                google.script.run
                    .withSuccessHandler(function(data) {
                        if (data.status === 'success') {
                            processData(data);
                        } else {
                            alert('Error: ' + data.message);
                        }
                        hideLoader();
                    })
                    .withFailureHandler(function(err) {
                        alert('Failed to connect to Google Sheets: ' + err);
                        hideLoader();
                    })
                    .getDashboardData(); // ชื่อฟังก์ชันใน Code.gs
            } catch (e) {
                console.error(e);
                hideLoader();
            }
        }

        function processData(data) {
            allTransactions = data.transactions || [];
            allPlans = data.plans || [];
            
            // Populate Banks
            const banks = new Set();
            [...allTransactions, ...allPlans].forEach(r => {
                const b = (r.Bank || r.bank || '').split('-')[0].trim();
                if(b) banks.add(b);
            });
            const bankSel = document.getElementById('filter-bank');
            bankSel.innerHTML = '<option value="All">ทั้งหมด</option>';
            [...banks].sort().forEach(b => {
                bankSel.innerHTML += `<option value="${b}">${b}</option>`;
            });

            applyFilters();
            updateLastSyncTime();
        }

        function applyFilters() {
            const bank = document.getElementById('filter-bank').value;
            const type = document.getElementById('filter-type').value;

            const filterFn = r => {
                if(bank !== 'All' && (r.Bank || r.bank || '').split('-')[0].trim() !== bank) return false;
                if(type !== 'All') {
                    const rowType = (r.Type || r.type || '').toLowerCase();
                    if(rowType !== type) return false;
                }
                return true;
            };

            const fTx = allTransactions.filter(filterFn);
            const fPl = allPlans.filter(filterFn);

            renderUI(fTx, fPl);
        }

        function renderUI(tx, pl) {
            let incAct = 0, expAct = 0, incPl = 0, expPl = 0;
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            const allData = [...tx, ...pl].sort((a,b) => new Date(b.Date || b.date) - new Date(a.Date || a.date));

            allData.forEach(r => {
                const amt = parseFloat((r.Amount || r.amount || 0).toString().replace(/,/g, '')) || 0;
                const rowType = (r.Type || r.type || '').toLowerCase();
                const status = (r.Status || r.status || '').toLowerCase();

                if(status.includes('plan')) {
                    if(rowType.includes('income')) incPl += amt;
                    else expPl += amt;
                } else {
                    if(rowType.includes('income')) incAct += amt;
                    else expAct += amt;
                }

                // Render Card
                const card = document.createElement('div');
                card.className = 'transaction-card';
                const date = new Date(r.Date || r.date).toLocaleDateString('th-TH');
                card.innerHTML = `
                    <div class="t-card-header">
                        <span>${date}</span>
                        <span class="${rowType}">${rowType.toUpperCase()}</span>
                    </div>
                    <div class="t-card-desc">${r.Description || r.description || '-'}</div>
                    <div class="t-card-amount ${rowType}">฿${amt.toLocaleString(undefined, {minimumFractionDigits:2})}</div>
                `;
                tbody.appendChild(card);
            });

            document.getElementById('income-actual').innerText = incAct.toLocaleString();
            document.getElementById('income-plan').innerText = incPl.toLocaleString();
            document.getElementById('expense-actual').innerText = expAct.toLocaleString();
            document.getElementById('expense-plan').innerText = expPl.toLocaleString();
            
            const net = (incAct + incPl) - (expAct + expPl);
            const netEl = document.getElementById('header-net-amount');
            netEl.innerText = net.toLocaleString();
            netEl.style.color = net >= 0 ? 'var(--income)' : 'var(--expense)';
        }

        function updateLastSyncTime() {
            document.getElementById('last-sync-time').innerText = 'อัปเดตล่าสุด: ' + new Date().toLocaleTimeString('th-TH');
        }

        function refreshData() { initDashboard(); }

        // Start
        window.onload = initDashboard;
    </script>
</body>
</html>
